<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIYE — Dashboard de Gestión</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: #e8e5e0;
    --text-primary: #1a1714;
    --text-secondary: #6b6560;
    --text-muted: #9c9590;
    --accent: #7c2d3e;
    --accent-light: #f9edef;
    --accent-mid: #c4566a;
    --green: #1a6b45;
    --green-light: #e8f5ee;
    --blue: #1a4a7c;
    --blue-light: #e8f0f9;
    --orange: #854f0b;
    --orange-light: #fdf3e3;
    --red: #8b1a1a;
    --red-light: #fdeaea;
    --purple: #4a1a7c;
    --purple-light: #f0e8f9;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); }
  .logo span { font-weight: 300; letter-spacing: 0.05em; color: var(--text-secondary); font-size: 13px; margin-left: 8px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); background: var(--green-light); padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .date-label { font-size: 12px; color: var(--text-muted); }
  .btn-refresh { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn-refresh:hover { background: var(--surface2); color: var(--text-primary); }

  .nav-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tabs-inner { max-width: 1280px; margin: 0 auto; display: flex; gap: 0; }
  .tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 500; color: var(--text-secondary); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; font-family: inherit; display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main { max-width: 1280px; margin: 0 auto; padding: 24px; }
  .section { display: none; }
  .section.active { display: block; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }

  .kpi-grid { display: grid; gap: 12px; }
  .kpi-grid-4 { grid-template-columns: repeat(4, 1fr); }
  .kpi-grid-3 { grid-template-columns: repeat(3, 1fr); }
  .kpi-grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 900px) { .kpi-grid-4 { grid-template-columns: repeat(2, 1fr); } .kpi-grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .kpi-grid-4, .kpi-grid-3, .kpi-grid-2 { grid-template-columns: 1fr; } }

  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
  .kpi-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .kpi-value { font-size: 26px; font-weight: 700; line-height: 1; color: var(--text-primary); letter-spacing: -0.02em; }
  .kpi-value.green { color: var(--green); }
  .kpi-value.blue  { color: var(--blue); }
  .kpi-value.red   { color: var(--red); }
  .kpi-value.orange { color: var(--orange); }
  .kpi-value.accent { color: var(--accent); }
  .kpi-value.purple { color: var(--purple); }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .var-pill { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin-top: 8px; }
  .var-up   { background: var(--green-light); color: var(--green); }
  .var-down { background: var(--red-light);   color: var(--red); }
  .var-neutral { background: var(--surface2); color: var(--text-secondary); }

  .progress-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--accent); transition: width 0.6s ease; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  .meta-banner { background: linear-gradient(135deg, #fff8f0 0%, #fdeee8 100%); border: 1px solid #f0d0b8; border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
  .meta-banner-icon { font-size: 32px; }
  .meta-banner-label { font-size: 11px; color: var(--orange); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta-banner-val { font-size: 28px; font-weight: 700; color: var(--orange); letter-spacing: -0.02em; }
  .meta-banner-sub { font-size: 11px; color: var(--text-muted); }

  .rank-list { display: flex; flex-direction: column; gap: 0; }
  .rank-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { font-size: 12px; color: var(--text-muted); width: 18px; flex-shrink: 0; font-weight: 600; }
  .rank-name { font-size: 13px; color: var(--text-primary); flex: 1; line-height: 1.3; }
  .rank-bar-wrap { width: 60px; height: 3px; background: var(--surface2); border-radius: 2px; flex-shrink: 0; }
  .rank-bar { height: 3px; border-radius: 2px; }
  .rank-val { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 70px; text-align: right; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 780px) { .two-col, .three-col { grid-template-columns: 1fr; } }

  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .badge-red    { background: var(--red-light); color: var(--red); }
  .badge-orange { background: var(--orange-light); color: var(--orange); }
  .badge-green  { background: var(--green-light); color: var(--green); }
  .badge-blue   { background: var(--blue-light); color: var(--blue); }
  .badge-grey   { background: var(--surface2); color: var(--text-muted); }

  .alert-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .alert-row:last-child { border-bottom: none; }
  .alert-name { font-size: 12px; color: var(--text-primary); flex: 1; }

  .gw-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .gw-row:last-child { border-bottom: none; }
  .gw-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .gw-name { font-size: 13px; color: var(--text-primary); flex: 1; }
  .gw-orders { font-size: 11px; color: var(--text-muted); }
  .gw-amount { font-size: 13px; font-weight: 600; color: var(--text-primary); }

  .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .log-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; }
  .log-item-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .log-item-val { font-size: 22px; font-weight: 700; color: var(--text-primary); }
  .log-item-val.orange { color: var(--orange); }
  .log-item-val.red    { color: var(--red); }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--surface2); }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table td.num { text-align: right; font-weight: 600; }
  .data-table td.center { text-align: center; }

  .roas-chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; }
  .roas-high { background: var(--green-light); color: var(--green); }
  .roas-mid  { background: var(--orange-light); color: var(--orange); }
  .roas-low  { background: var(--red-light); color: var(--red); }

  .source-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .source-row:last-child { border-bottom: none; }
  .source-channel { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: var(--blue-light); color: var(--blue); white-space: nowrap; min-width: 110px; text-align: center; }
  .source-origin { font-size: 12px; color: var(--text-secondary); flex: 1; }
  .source-sessions { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 60px; text-align: right; }
  .source-conv { font-size: 12px; color: var(--green); min-width: 60px; text-align: right; font-weight: 600; }

  /* CASHFLOW */
  .cf-row { display: grid; grid-template-columns: 140px 1fr 1fr 1fr 1fr 1fr 1fr 1fr; gap: 4px; padding: 8px 4px; border-bottom: 1px solid var(--border); font-size: 12px; align-items: center; }
  .cf-row:last-child { border-bottom: none; }
  .cf-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 4px; }
  .cf-cell { text-align: right; }
  .cf-cell.date { text-align: left; font-weight: 500; color: var(--text-secondary); }
  .cf-pos { color: var(--green); font-weight: 700; }
  .cf-neg { color: var(--red); font-weight: 700; }

  /* CUENTA BANCARIA CARD */
  .cuenta-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; }
  .cuenta-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .cuenta-nombre { font-size: 13px; font-weight: 700; }
  .cuenta-gateway { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .cuenta-total { font-size: 20px; font-weight: 700; }
  .cuenta-body { padding: 0; }
  .cuenta-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--border); font-size: 12px; align-items: center; }
  .cuenta-row:last-child { border-bottom: none; }
  .cuenta-fecha { color: var(--text-secondary); font-weight: 500; }
  .cuenta-monto { font-weight: 600; text-align: right; }

  .loading { display: flex; align-items: center; gap: 12px; padding: 60px 20px; justify-content: center; color: var(--text-muted); font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: var(--red-light); border: 1px solid #f0b0b0; border-radius: var(--radius); padding: 20px 24px; color: var(--red); font-size: 13px; }

  .fin-table { width: 100%; border-collapse: collapse; font-size: 12px; overflow-x: auto; display: block; }
  .fin-table th { padding: 8px 12px; background: var(--accent); color: white; font-weight: 600; text-align: right; white-space: nowrap; position: sticky; top: 0; }
  .fin-table th:first-child { text-align: left; position: sticky; left: 0; z-index: 2; }
  .fin-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right; white-space: nowrap; }
  .fin-table td:first-child { text-align: left; font-weight: 500; background: var(--surface); position: sticky; left: 0; }
  .fin-table .row-header td { background: var(--surface2); font-weight: 700; }
  .fin-table .row-result td { background: var(--blue-light); font-weight: 700; color: var(--blue); }
  .fin-table .row-final td { background: var(--purple-light); font-weight: 700; color: var(--purple); }
  .fin-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

  .mt-16 { margin-top: 16px; }
  .mt-12 { margin-top: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .gap-16 { gap: 16px; }

  .empty-state { text-align: center; padding: 32px 20px; color: var(--text-muted); font-size: 13px; font-style: italic; }
/* MOBILE NAV */
.mobile-menu-btn { display: none; }
.mobile-menu-overlay { display: none; }

@media (max-width: 768px) {
  .nav-tabs { display: none; }
  
  .mobile-menu-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
  }

  .mobile-menu-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  .mobile-menu-overlay.open { display: block; }

  .mobile-menu-panel {
    position: fixed;
    top: 0; right: 0;
    width: 260px;
    height: 100%;
    background: var(--surface);
    box-shadow: -4px 0 20px rgba(0,0,0,0.15);
    z-index: 201;
    padding: 20px 0;
    overflow-y: auto;
  }
  .mobile-menu-header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mobile-menu-close {
    background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);
  }
  .mobile-tab-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    border: none;
    background: none;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .mobile-tab-btn:hover { background: var(--surface2); }
  .mobile-tab-btn.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }

  .header-inner { flex-wrap: wrap; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<div id="login-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow-md);max-width:340px;width:90%;text-align:center;">
    <div class="logo" style="font-size:20px;margin-bottom:4px;">MIYE</div>
    <div style="color:var(--text-muted);font-size:13px;margin-bottom:24px;">dashboard de gestión</div>
    <input type="password" id="login-pass" placeholder="Contraseña" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;margin-bottom:12px;box-sizing:border-box;" onkeypress="if(event.key==='Enter')checkLogin()">
    <button onclick="checkLogin()" style="width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Ingresar</button>
    <div id="login-error" style="color:var(--red);font-size:12px;margin-top:10px;display:none;">Contraseña incorrecta</div>
  </div>
</div>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="logo">MIYE <span>dashboard de gestión</span></div>
      <div class="live-badge"><div class="live-dot"></div> en vivo</div>
    </div>
   <div class="header-right">
      <div class="date-label" id="date-label"></div>
      <button class="btn-refresh" onclick="cargarDatos()">↻ actualizar</button>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰ Menú</button>
    </div>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tabs-inner">
    <button class="tab-btn active" onclick="showTab('tablero', this)">📊 Tablero</button>
    <button class="tab-btn" onclick="showTab('ventas', this)">📈 Ventas</button>
    <button class="tab-btn" onclick="showTab('metaads', this)">📣 Meta Ads</button>
    <button class="tab-btn" onclick="showTab('clientes', this)">👥 Clientes</button>
    <button class="tab-btn" onclick="showTab('stock', this)">📦 Stock</button>
    <button class="tab-btn" onclick="showTab('carritos', this)">🛒 Carritos</button>
    <button class="tab-btn" onclick="showTab('trafico', this)">🌐 Tráfico</button>
    <button class="tab-btn" onclick="showTab('financiero', this)">💎 Financiero</button>
    <button class="tab-btn" onclick="showTab('flujocaja', this)">💰 Flujo de Caja</button>
  </div>
</div>
<div class="mobile-menu-overlay" id="mobile-overlay" onclick="closeMobileMenu()"></div>
<div class="mobile-menu-panel" id="mobile-panel" style="display:none;">
  <div class="mobile-menu-header">
    <strong>Secciones</strong>
    <button class="mobile-menu-close" onclick="closeMobileMenu()">✕</button>
  </div>
  <button class="mobile-tab-btn active" data-tab="tablero" onclick="showMobileTab('tablero', this)">📊 Tablero</button>
  <button class="mobile-tab-btn" data-tab="ventas" onclick="showMobileTab('ventas', this)">📈 Ventas</button>
  <button class="mobile-tab-btn" data-tab="metaads" onclick="showMobileTab('metaads', this)">📣 Meta Ads</button>
  <button class="mobile-tab-btn" data-tab="clientes" onclick="showMobileTab('clientes', this)">👥 Clientes</button>
  <button class="mobile-tab-btn" data-tab="stock" onclick="showMobileTab('stock', this)">📦 Stock</button>
  <button class="mobile-tab-btn" data-tab="carritos" onclick="showMobileTab('carritos', this)">🛒 Carritos</button>
  <button class="mobile-tab-btn" data-tab="trafico" onclick="showMobileTab('trafico', this)">🌐 Tráfico</button>
  <button class="mobile-tab-btn" data-tab="financiero" onclick="showMobileTab('financiero', this)">💎 Financiero</button>
  <button class="mobile-tab-btn" data-tab="flujocaja" onclick="showMobileTab('flujocaja', this)">💰 Flujo de Caja</button>
</div>

<div class="main" id="main-content">
  <div class="loading"><div class="spinner"></div>Conectando con MIYE...</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw7PuEmdNmaAh8IQCrUEM_oGcRk5ePhrjiPAt5idw3vJ52mO0ULMWV3U8asuM-qyNqmcg/exec";

let DATA = null;
let CURRENT_TAB = 'tablero';

const ars = n => "$ " + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
const pct = n => (n >= 0 ? "▲ " : "▼ ") + Math.abs(n).toFixed(1) + "%";
const pctClass = n => n >= 0 ? "var-up" : "var-down";
const roasClass = r => r >= 10 ? "roas-high" : r >= 3 ? "roas-mid" : "roas-low";

const GW_COLORS = {
  "Pago Nube": "#7c2d3e",
  "Mercado Pago": "#009ee3",
  "GOcuotas": "#f97316",
  "Nave": "#1a6b45",
  "Transferencia o depósito bancario": "#1a4a7c",
  "MODO": "#e11d48",
  "default": "#9ca3af"
};

// Mapeo gateway → cuenta de acreditación
const CUENTAS = {
  "Pago Nube":                             { nombre: "BBVA Francés — Rafael Collazzo",    color: "#7c2d3e",  bg: "#f9edef" },
  "Mercado Pago":                          { nombre: "MP Valentina Castaño",              color: "#009ee3",  bg: "#e3f4fb" },
  "Nave":                                  { nombre: "Bco Galicia — Sebastián Castaño",   color: "#1a6b45",  bg: "#e8f5ee" },
  "Transferencia o depósito bancario":     { nombre: "MP Adair Castaño",                  color: "#4a1a7c",  bg: "#f0e8f9" },
  "GOcuotas":                              { nombre: "Echeq — Rafael Collazzo",            color: "#854f0b",  bg: "#fdf3e3" },

function setDate() {
  const hoy = new Date();
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  document.getElementById("date-label").textContent =
    dias[hoy.getDay()] + " " + hoy.getDate() + " " + meses[hoy.getMonth()] + " " + hoy.getFullYear();
}

function showTab(tab, btn) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (DATA) renderTab(tab, DATA);
}
function toggleMobileMenu() {
  document.getElementById('mobile-overlay').classList.add('open');
  document.getElementById('mobile-panel').style.display = 'block';
}
function closeMobileMenu() {
  document.getElementById('mobile-overlay').classList.remove('open');
  document.getElementById('mobile-panel').style.display = 'none';
}
function showMobileTab(tab, btn) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.mobile-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (DATA) renderTab(tab, DATA);
  closeMobileMenu();
}

function renderTab(tab, d) {
  const el = document.getElementById('main-content');
  switch(tab) {
    case 'tablero':    el.innerHTML = renderTablero(d); break;
    case 'ventas':     el.innerHTML = renderVentas(d); break;
    case 'metaads':    el.innerHTML = renderMetaAds(d); break;
    case 'clientes':   el.innerHTML = renderClientes(d); break;
    case 'stock':      el.innerHTML = renderStock(d); break;
    case 'carritos':   el.innerHTML = renderCarritos(d); break;
    case 'trafico':    el.innerHTML = renderTrafico(d); break;
    case 'financiero': el.innerHTML = renderFinanciero(d); break;
    case 'flujocaja':  el.innerHTML = renderFlujoCaja(d); break;
  }
}

// ── FLUJO DE CAJA ──
function renderFlujoCaja(d) {
  const sc  = d.saldosCuentas  || { cuentas:[], totalDisponible:0, totalPorAcreditar:0 };
  const fp  = d.flujoProyectado || { movimientos:[], alertasRojo:[], alertasAmarillo:[] };
  const cf  = d.flujoCaja || {};
  const alertas = cf.alertas || [];

  const totalDisp  = sc.totalDisponible   || 0;
  const totalAcred = sc.totalPorAcreditar || 0;
  const totalLiquidez = totalDisp + totalAcred;

  // Agrupar movimientos por fecha para la tabla
  const movsPorFecha = {};
  (fp.movimientos || []).forEach(m => {
    if (!m.fecha) return;
    if (!movsPorFecha[m.fecha]) movsPorFecha[m.fecha] = [];
    movsPorFecha[m.fecha].push(m);
  });

  const colores = {
    "BBVA Rafael":    "#1a4a7c",
    "MP Valentina":   "#009ee3",
    "MP Adair":       "#00b4d8",
    "MP Guillermina": "#48cae4",
    "GOcuotas":       "#4a1a7c",
    "Variable":       "#854f0b",
  };

  return `
    <div class="section-header"><div>
      <div class="section-title">Flujo de Caja</div>
      <div class="section-sub">Saldos reales por cuenta · Proyección 60 días</div>
    </div></div>

    <!-- SALDOS POR CUENTA -->
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;">💰 LIQUIDEZ ACTUAL POR CUENTA</div>
    <div class="kpi-grid kpi-grid-3 mb-16">
      ${sc.cuentas.map(c => `
        <div class="kpi-card">
          <div class="kpi-label">${c.cuenta}</div>
          <div class="kpi-value" style="color:var(--green);font-size:18px">${ars(c.disponible)}</div>
          ${c.porAcreditar > 0 ? `<div class="kpi-sub" style="color:var(--blue)">+ ${ars(c.porAcreditar)} por acreditar</div>` : '<div class="kpi-sub">—</div>'}
        </div>`).join("")}
    </div>

    <!-- TOTAL LIQUIDEZ -->
    <div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:18px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text-muted)">Total liquidez disponible</div>
        <div style="font-size:28px;font-weight:800;color:${totalDisp < 2000000 ? 'var(--red)' : 'var(--green)'};margin-top:4px">${ars(totalDisp)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text-muted)">Por acreditar</div>
        <div style="font-size:20px;font-weight:700;color:var(--blue)">${ars(totalAcred)}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Total: ${ars(totalLiquidez)}</div>
      </div>
    </div>

    <!-- ALERTAS CHEQUES 7 DIAS -->
    ${alertas.length > 0 ? `
    <div style="background:var(--red-light);border:1px solid #f0c0c0;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:10px;">⚠️ CHEQUES A VENCER EN LOS PRÓXIMOS 7 DÍAS</div>
      ${alertas.map(a => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0c0c0;">
          <span style="font-size:13px;font-weight:600;color:var(--red)">${a.fecha}</span>
          <span style="font-size:13px;font-weight:700;color:var(--red)">${ars(a.monto)}</span>
        </div>`).join("")}
    </div>` : `
    <div style="background:var(--green-light);border:1px solid #b0ddc0;border-radius:var(--radius);padding:14px 20px;margin-bottom:16px;color:var(--green);font-size:13px;font-weight:600;">
      ✅ Sin cheques a vencer en los próximos 7 días
    </div>`}

    <!-- ALERTAS FLUJO PROYECTADO -->
    ${fp.alertasRojo && fp.alertasRojo.length > 0 ? `
    <div style="background:var(--red-light);border:1px solid #f0c0c0;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px;">🚨 SALDO PROYECTADO NEGATIVO EN ESTAS FECHAS</div>
      ${fp.alertasRojo.slice(0,5).map(m => `
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0c0c0;">
          <span style="font-size:13px;font-weight:600;color:var(--red)">${m.fecha} — ${m.concepto}</span>
          <span style="font-size:13px;font-weight:700;color:var(--red)">${ars(m.saldo)}</span>
        </div>`).join("")}
    </div>` : ""}

    ${fp.alertasAmarillo && fp.alertasAmarillo.length > 0 ? `
    <div style="background:var(--orange-light);border:1px solid #f0d0a0;border-radius:var(--radius);padding:14px 20px;margin-bottom:16px;">
      <div style="font-size:12px;font-weight:700;color:var(--orange);margin-bottom:6px;">⚠️ SALDO AJUSTADO (menos de $2M) EN ${fp.alertasAmarillo.length} FECHA/S</div>
    </div>` : ""}

    <div class="divider"></div>

    <!-- PROYECCION DIA A DIA -->
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;">📅 PROYECCIÓN DÍA A DÍA — 60 DÍAS</div>
    <div class="card" style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr style="background:#1a1a1a;color:#fff;">
            <th style="padding:10px 12px;text-align:left;">Fecha</th>
            <th style="padding:10px 12px;text-align:left;">Concepto</th>
            <th style="padding:10px 12px;text-align:left;">Cuenta</th>
            <th style="padding:10px 12px;text-align:right;">Entrada</th>
            <th style="padding:10px 12px;text-align:right;">Salida</th>
            <th style="padding:10px 12px;text-align:right;">Saldo</th>
          </tr>
        </thead>
        <tbody>
          ${Object.keys(movsPorFecha).sort().map((fecha, fi) => {
            const movs = movsPorFecha[fecha];
            return movs.map((m, mi) => {
              const ultimoDelDia = mi === movs.length - 1;
              const saldoColor = m.saldo === null ? "" : m.saldo < 0 ? "color:var(--red);font-weight:700" : m.saldo < 2000000 ? "color:var(--orange);font-weight:700" : "color:var(--green);font-weight:700";
              const bgRow = fi % 2 === 0 ? "#f9fbe7" : "#ffffff";
              return `<tr style="background:${bgRow};border-bottom:1px solid var(--border);">
                <td style="padding:7px 12px;color:var(--text-secondary);font-weight:${mi===0?'700':'400'}">${mi===0 ? fecha : ""}</td>
                <td style="padding:7px 12px;">${m.concepto}</td>
                <td style="padding:7px 12px;color:${colores[m.cuenta]||'var(--text-muted)'};font-size:11px;">${m.cuenta}</td>
                <td style="padding:7px 12px;text-align:right;color:var(--green);font-weight:600">${m.entrada > 0 ? ars(m.entrada) : "—"}</td>
                <td style="padding:7px 12px;text-align:right;color:var(--red);font-weight:600">${m.salida > 0 ? ars(m.salida) : "—"}</td>
                <td style="padding:7px 12px;text-align:right;${ultimoDelDia ? saldoColor : 'color:var(--text-muted)'}">${ultimoDelDia && m.saldo !== null ? ars(m.saldo) : ""}</td>
              </tr>`;
            }).join("");
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

// ── HELPERS ──
function rankList(items, color) {
  if (!items || items.length === 0) return '<div class="empty-state">Sin datos</div>';
  const maxVal = Math.max(...items.map(i => parseInt(i[1]) || 0));
  return items.map((item, i) => `
    <div class="rank-row">
      <span class="rank-num">${i+1}</span>
      <span class="rank-name">${item[0]}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${maxVal > 0 ? Math.round((parseInt(item[1])||0)/maxVal*100) : 0}%;background:${color}"></div></div>
      <span class="rank-val">${item[1]}</span>
    </div>`).join("");
}

async function cargarDatos() {
  document.getElementById("main-content").innerHTML = '<div class="loading"><div class="spinner"></div>Actualizando datos...</div>';
  try {
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error("Error " + resp.status);
    DATA = await resp.json();
    renderTab(CURRENT_TAB, DATA);
  } catch(err) {
    document.getElementById("main-content").innerHTML = `
      <div class="error-box">
        <strong>No se pudo conectar con el servidor.</strong><br>
        Verificá que el script de Apps Script esté publicado como Web App.<br>
        <small style="opacity:.7;margin-top:4px;display:block;">${err.message}</small>
      </div>`;
  }
}
